name: codexui-multi-server

x-codex-cli-service: &codex-cli-service
  build:
    context: ../..
    dockerfile: docker/multi-server/Dockerfile.codex-cli
  environment:
    CODEX_HOME: /root/.codex
  volumes:
    - ${CODEX_MULTI_SERVER_AUTH_FILE:-/tmp/codexui-multi-server-auth/auth.json}:/root/.codex/auth.json:ro

services:
  codex-cli-a:
    <<: *codex-cli-service
    command: ["codex", "app-server", "--listen", "ws://0.0.0.0:9101"]
    ports:
      - "127.0.0.1:19101:9101"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('node:net');const s=net.connect(9101,'127.0.0.1');s.once('connect',()=>{s.end();process.exit(0)});s.once('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1500);\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  codex-cli-b:
    <<: *codex-cli-service
    command: ["codex", "app-server", "--listen", "ws://0.0.0.0:9102"]
